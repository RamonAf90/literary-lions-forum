{{define "title"}}Image View - Literary Lions Forum{{end}}

{{define "image-modal-content"}}
<div style="position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 90vw; max-height: 90vh; text-align: center;">
        <img src="/{{.ImagePath}}" style="max-width: 100%; max-height: 100%; border-radius: 10px;">
        <div style="color: white; text-align: center; margin-top: 1rem; font-size: 1.1rem;">
            <p style="margin-top: 0.5rem; font-size: 0.9rem; opacity: 0.8;"></p>
        </div>
        <div style="margin-top: 2rem;">
            <a href="/" class="btn btn-primary" style="background: #007bff; color: white; padding: 0.8rem 1.5rem; border-radius: 10px; text-decoration: none; font-weight: 600;">
                ✕ Close
            </a>
        </div>
    </div>
</div>
{{end}}
