{{define "login-content"}}
<div class="card" style="max-width: 500px; margin: 2rem auto;">
    <h2 class="text-center mb-3"> Enter the club</h2>
    <p class="text-center" style="color: #b8860b; margin-bottom: 2rem;">Welcome back, fellow book lion! Ready to post with literary discussions?</p>
    
    {{if .Error}}
    <div class="error">🚫 {{.Error}}</div>
    {{end}}
    
    <form method="POST" action="/login">
        <div class="form-group">
            <label for="email">📧 Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your.email@bookclub.com">
        </div>
        
        <div class="form-group">
            <label for="password">🔐 Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;"> Log in</button>
    </form>
    
    <div class="text-center mt-3">
        <p style="color: #b8860b;">New to the club? <a href="/register" style="color: #8a6e14; font-weight: 600;"> Join the Literary Lions</a></p>
    </div>
    
    <div class="text-center mt-3" style="padding-top: 1rem; border-top: 1px solid rgba(212, 175, 55, 0.3);">
        <small style="color: #b8860b; font-style: italic;">🏛️ where readers connect, stories are shared, and every chat brings something new.</small>
    </div>
</div>
{{end}}
